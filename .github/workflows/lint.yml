name: Lint and format

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selene:
    name: Selene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install selene
        run: |
          VERSION=0.31.0
          curl -sSL "https://github.com/Kampfkarren/selene/releases/download/${VERSION}/selene-${VERSION}-linux.zip" -o /tmp/selene.zip
          sudo unzip /tmp/selene.zip -d /usr/local/bin selene
          sudo chmod +x /usr/local/bin/selene
          selene --version

      - run: selene --config selene.toml lua/

  stylua:
    name: StyLua
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.5.2
          args: --check .
