name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Neovim ${{ matrix.nvim }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        nvim: [stable, nightly]
    continue-on-error: ${{ matrix.nvim == 'nightly' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install neovim
        run: |
          sudo add-apt-repository ppa:neovim-ppa/stable -y
          sudo apt-get update
          if [ "${{ matrix.nvim }}" = "nightly" ]; then
            sudo add-apt-repository ppa:neovim-ppa/unstable -y
            sudo apt-get update
          fi
          sudo apt-get install -y neovim
          nvim --version | head -3

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: .ci/vendor
          key: vendor-${{ hashFiles('Makefile') }}

      - name: Fetch dependencies
        run: make dependencies

      - name: Run tests
        run: make test

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ matrix.nvim }}
          path: |
            .ci/vendor/**/log
            **/*.log
          if-no-files-found: ignore
          retention-days: 7
